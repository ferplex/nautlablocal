<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nautilus Lab - Creative Direction</title>
    <style>
        :root {
            --bg-color: #030811;
            --accent-blue: #00f3ff;
            --accent-purple: #bd00ff;
            --text-main: #ffffff;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Fondo espacial profundo animado */
        .stars-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            background: 
                radial-gradient(circle at 50% 50%, rgba(189, 0, 255, 0.08), transparent 60%),
                radial-gradient(circle at 20% 30%, rgba(0, 243, 255, 0.05), transparent 40%);
        }

        /* Contenedor Principal */
        .branding-container {
            position: relative;
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: containerEntrance 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* SVG del Logo Minimalista y Futurista */
        .logo-svg {
            width: 240px;
            height: 240px;
            filter: drop-shadow(0 0 25px rgba(0, 243, 255, 0.35)) drop-shadow(0 0 50px rgba(189, 0, 255, 0.2));
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-svg:hover {
            transform: scale(1.04) rotate(1deg);
        }

        /* Animación de trazo de líneas infinitas */
        .nautilus-path {
            stroke-dasharray: 1200;
            stroke-dashoffset: 1200;
            animation: drawLogo 3s cubic-bezier(0.4, 0, 0.2, 1) forwards, pulseGlow 4s ease-in-out infinite alternate 3s;
        }

        .blade-path {
            stroke-dasharray: 600;
            stroke-dashoffset: 600;
            animation: drawLogo 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards 0.4s;
        }

        .hud-ring {
            transform-origin: 150px 150px;
            animation: rotateHUD 25s linear infinite;
        }

        .hud-ring-reverse {
            transform-origin: 150px 150px;
            animation: rotateHUDReverse 45s linear infinite;
        }

        /* Bloque de Textos */
        .brand-info {
            margin-top: 40px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards 1.2s;
        }

        .brand-title {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--text-main);
            margin-bottom: 12px;
            padding-left: 0.4em; /* Compensa el letter-spacing para centrado perfecto */
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .brand-subtitle {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.6em;
            text-transform: uppercase;
            color: var(--accent-blue);
            padding-left: 0.6em;
            margin-bottom: 30px;
        }

        /* Enlace de Acción estilo Interfaz de Nave */
        .cta-button {
            display: inline-block;
            text-decoration: none;
            color: var(--text-main);
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            padding: 14px 32px;
            border: 1px solid rgba(0, 243, 255, 0.25);
            background: rgba(0, 243, 255, 0.02);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 243, 255, 0.15), transparent);
            transition: left 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .cta-button:hover {
            border-color: var(--accent-blue);
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.2);
            background: rgba(0, 243, 255, 0.06);
            transform: translateY(-2px);
        }

        .cta-button:hover::before {
            left: 100%;
        }

        /* Animaciones CSS Keyframes */
        @keyframes containerEntrance {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes drawLogo {
            to { stroke-dashoffset: 0; }
        }

        @keyframes pulseGlow {
            0% { filter: drop-shadow(0 0 25px rgba(0, 243, 255, 0.35)) drop-shadow(0 0 50px rgba(189, 0, 255, 0.2)); }
            100% { filter: drop-shadow(0 0 35px rgba(0, 243, 255, 0.5)) drop-shadow(0 0 65px rgba(189, 0, 255, 0.35)); }
        }

        @keyframes rotateHUD {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes rotateHUDReverse {
            from { transform: rotate(0deg); }
            to { transform: rotate(-360deg); }
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="stars-container"></div>

    <div class="branding-container">
        <!-- Logo SVG vectorizado unificando el Nautilus Minimalista y la Espada Cósmica -->
        <svg class="logo-svg" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- Gradiente para el Nautilus/Pulpo -->
                <linearGradient id="nautilusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#bd00ff" />
                    <stop offset="60%" stop-color="#00f3ff" />
                    <stop offset="100%" stop-color="#0066ff" />
                </linearGradient>
                <!-- Gradiente para la Espada/Sable -->
                <linearGradient id="bladeGrad" x1="100%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#00f3ff" />
                    <stop offset="100%" stop-color="#bd00ff" />
                </linearGradient>
            </defs>

            <!-- Interfaz HUD Circular Exterior -->
            <circle class="hud-ring-reverse" cx="150" cy="150" r="135" stroke="rgba(0, 243, 255, 0.08)" stroke-width="1.5" stroke-dasharray="10 15 40 10" />
            <circle class="hud-ring" cx="150" cy="150" r="122" stroke="rgba(189, 0, 255, 0.12)" stroke-width="1" stroke-dasharray="200 40 10 40" />
            <circle cx="150" cy="150" r="110" stroke="rgba(0, 243, 255, 0.03)" stroke-width="1" />

            <!-- Trazo del Sable de Luz en Diagonal -->
            <path class="blade-path" d="M 60,240 L 230,70" stroke="url(#bladeGrad)" stroke-width="5" stroke-linecap="round" />
            <path class="blade-path" d="M 225,65 L 245,45" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />
            <!-- Detalles de la Empuñadura -->
            <path class="blade-path" d="M 62,238 L 48,252" stroke="url(#nautilusGrad)" stroke-width="8" stroke-linecap="round" />
            <path class="blade-path" d="M 75,225 L 55,245" stroke="url(#bladeGrad)" stroke-width="10" stroke-linecap="round" />

            <!-- El Nautilus: Tentáculos Minimalistas Simétricos Continuos -->
            <path class="nautilus-path" d="
                M 150,90 
                C 120,90 100,110 100,140 
                C 100,180 140,195 125,220 
                C 115,235 90,225 90,205
                C 90,185 115,175 115,160
                M 150,90
                C 180,90 200,110 200,140
                C 200,180 160,195 175,220
                C 185,235 210,225 210,205
                C 210,185 185,175 185,160
                M 150,90
                L 150,185
                M 150,130
                C 140,135 130,145 130,155
                M 150,130
                C 160,135 170,145 170,155
            " stroke="url(#nautilusGrad)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" />

            <!-- Núcleo de energía central -->
            <circle cx="150" cy="120" r="7" fill="#ffffff" filter="drop-shadow(0 0 8px #00f3ff)" />
        </svg>

        <div class="brand-info">
            <h1 class="brand-title">Nautilus Lab</h1>
            <p class="brand-subtitle">Interactive Animation Intelligence</p>
            <a href="https://ferplex12.itch.io/" target="_blank" class="cta-button">Ingresar al Lab</a>
        </div>
    </div>

</body>
</html>
